name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/api-lendyph
            # Discard any local changes (e.g. regenerated api-docs.json) to avoid pull conflicts
            git fetch origin main
            git reset --hard origin/main
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan l5-swagger:generate
            chown -R www-data:www-data storage bootstrap/cache

            # Ensure Laravel scheduler cron is installed (idempotent)
            CRON_CMD="* * * * * cd /var/www/api-lendyph && php artisan schedule:run >> /dev/null 2>&1"
            (crontab -l 2>/dev/null | grep -qF "api-lendyph" || (crontab -l 2>/dev/null; echo "$CRON_CMD") | crontab -)

            echo "Deployed at $(date)"
